<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#E8E4DE"/>
  <!-- 3D printed tool / rib tool shape -->
  <rect x="160" y="120" width="80" height="180" rx="10" ry="10" fill="none" stroke="#4A90A4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 3D print layer lines -->
  <line x1="162" y1="145" x2="238" y2="145" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="160" x2="238" y2="160" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="175" x2="238" y2="175" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="190" x2="238" y2="190" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="205" x2="238" y2="205" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="220" x2="238" y2="220" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="235" x2="238" y2="235" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="250" x2="238" y2="250" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="265" x2="238" y2="265" stroke="#A8D8E0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Serrated edge -->
  <path d="M 160 130 L 145 138 L 160 146 L 145 154 L 160 162 L 145 170 L 160 178" fill="none" stroke="#7DBFCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small 3D cube icon top right -->
  <polygon points="290,110 310,100 330,110 330,130 310,140 290,130" fill="none" stroke="#4A90A4" stroke-width="2" stroke-linejoin="round"/>
  <line x1="310" y1="100" x2="310" y2="140" stroke="#4A90A4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="290" y1="110" x2="310" y2="120" stroke="#4A90A4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="110" x2="310" y2="120" stroke="#4A90A4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="345" font-family="Georgia, serif" font-size="13" fill="#B0A89E" text-anchor="middle" font-style="italic">3D Printed Supplies</text>
</svg>
